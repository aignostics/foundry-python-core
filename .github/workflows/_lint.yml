name: "Lint"

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Dev Environment
        uses: ./.github/actions/setup-dev-env

      - name: Lint
        # Skip mise-lock: the hook mutates mise.lock (cannot commit in CI, causes "files modified" failure).
        # mise-lock-sync.yml verifies freshness as a separate job on PRs touching mise config.
        run: SKIP=mise-lock mise run pre_commit_run_all
