name: "+ Scheduled Audit"

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:

jobs:
  audit-scheduled:
    uses: ./.github/workflows/_scheduled-audit.yml
    permissions:
      contents: read
      id-token: write
    secrets:
      BETTERSTACK_AUDIT_HEARTBEAT_URL: ${{ secrets.BETTERSTACK_AUDIT_HEARTBEAT_URL }}
