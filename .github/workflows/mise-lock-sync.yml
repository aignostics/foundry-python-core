name: Mise lockfile verify

on:
  pull_request:
    branches: [main]
    paths:
      - 'mise.toml'
      - '.mise.toml'
      - 'mise.lock'
      - '.mise.lock'
      - 'mise.*.toml'
      - '.mise.*.toml'
      - 'mise/config.toml'
      - '.mise/config.toml'
      - '.config/mise.toml'
      - '.config/mise/config.toml'
      - '.config/mise/conf.d/*.toml'

jobs:
  verify-lockfile:
    name: Verify mise lockfile in sync
    runs-on: ubuntu-latest
    # default permissions (contents: read) — no write needed

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: false
          version: "2026.4.20"

      - name: Regenerate mise.lock
        run: mise lock

      - name: Verify mise.lock is up to date
        run: |
          if ! git diff --exit-code -- mise.lock; then
            {
              echo "### \`mise.lock\` is out of date"
              echo ""
              echo "Regenerate locally and commit the result:"
              echo ""
              echo '```bash'
              echo "mise lock"
              echo "git add mise.lock"
              echo "git commit -m 'chore: regenerate mise.lock'"
              echo "git push"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error file=mise.lock::mise.lock is out of date — see job summary for fix"
            exit 1
          fi
