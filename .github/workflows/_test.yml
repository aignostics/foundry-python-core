name: "> Test"

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: true
      SONAR_TOKEN:
        required: true
      AIGNOSTICS_FOUNDRY_CORE_LOGFIRE_TOKEN:
        required: false
      AIGNOSTICS_FOUNDRY_CORE_SENTRY_DSN:
        required: false

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup Dev Environment
        uses: ./.github/actions/setup-dev-env

      - name: Release version check
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          TOML_VERSION=$(grep -m 1 '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$TOML_VERSION" ]; then
            echo "Release version mismatch: Tag $TAG_VERSION != pyproject.toml $TOML_VERSION"
            exit 1
          fi

      - name: Print development version info
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          TOML_VERSION=$(grep -m 1 '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Development build - Current version in pyproject.toml: $TOML_VERSION"

      - name: Test / Unit
        uses: ./.github/actions/run-tests
        with:
          test-type: unit
          mise-task: test_unit
          skip-marker: skip:test:unit
          summary-title: All unit tests passed
          commit-message: ${{ github.event.head_commit.message }}

      - name: Test / Integration
        uses: ./.github/actions/run-tests
        with:
          test-type: integration
          mise-task: test_integration
          skip-marker: skip:test:integration
          summary-title: All integration tests passed
          commit-message: ${{ github.event.head_commit.message }}

      - name: Test / E2E
        uses: ./.github/actions/run-tests
        with:
          test-type: e2e
          mise-task: test_e2e
          skip-marker: skip:test:e2e
          summary-title: All e2e tests passed
          commit-message: ${{ github.event.head_commit.message }}

      - name: Test / Unit (lowest-direct)
        uses: ./.github/actions/run-tests
        with:
          test-type: unit
          mise-task: test_lowest_direct
          skip-marker: skip:test:lowest-direct
          summary-title: All unit tests passed with lowest-direct dependencies
          commit-message: ${{ github.event.head_commit.message }}

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() && (env.GITHUB_WORKFLOW_RUNTIME != 'ACT') }}
        with:
          name: test-results
          path: |
            reports/junit.xml
            reports/coverage.xml
            reports/coverage.md
            reports/coverage_html
            aignostics_foundry_core.log
          retention-days: 30

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        if: ${{ !cancelled() && (env.GITHUB_WORKFLOW_RUNTIME != 'ACT') }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: aignostics/foundry-python-core

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && (env.GITHUB_WORKFLOW_RUNTIME != 'ACT') }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: SonarQube Scan
        if: ${{ !cancelled() && (env.GITHUB_WORKFLOW_RUNTIME != 'ACT') }}
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
